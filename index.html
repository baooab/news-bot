<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>科技资讯</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@1.0.2/css/bulma.min.css">
<style>
  html, body { background:#f7f8fa; }
  .hero.is-tech {
    background:linear-gradient(135deg,#0f2027 0%,#203a43 50%,#2c5364 100%);
    color:#fff;
  }
  .hero.is-tech .title,
  .hero.is-tech .subtitle { color:#fff !important; }
  .hero.is-tech .has-text-grey-light { color:rgba(255,255,255,.78) !important; }
  .hero.is-tech .has-text-grey { color:rgba(255,255,255,.62) !important; }
  .brief-card { transition:box-shadow .2s, transform .2s; height:100%; }
  .brief-card:hover { box-shadow:0 6px 22px rgba(0,0,0,.10); transform:translateY(-3px); }
  .src-tags .tag { margin:2px 4px 2px 0; }
  .footer { background:transparent; }
</style>
</head>
<body>

<section class="hero is-tech">
  <div class="hero-body has-text-centered">
    <p class="title is-2" style="letter-spacing:3px;">科技资讯</p>
    <p class="subtitle is-6 mt-3 has-text-grey-light">
      每天 07:00 自动更新 · 6 条科技 + 6 条民生社会 · 贴图公众号系列
    </p>
    <p class="is-size-7 has-text-grey">
      Solidot / IT之家 / 36氪 / 澎湃 / 联合早报
    </p>
  </div>
</section>

<section class="section">
  <div class="container" style="max-width:900px;">
    <div id="loading" class="has-text-centered has-text-grey py-6">
      <p class="mt-2">正在加载简报列表…</p>
    </div>
    <div id="error" class="notification is-warning is-light" style="display:none;"></div>
    <div id="list" class="columns is-multiline"></div>
  </div>
</section>

<footer class="footer">
  <div class="content has-text-centered has-text-grey is-size-7">
    <p>数据以 JSON 存储于 <code>data/briefs/</code> · 由 GitHub Actions 每日自动生成</p>
  </div>
</footer>

<script>
async function load() {
  const loading = document.getElementById('loading');
  const errBox = document.getElementById('error');
  const list = document.getElementById('list');
  try {
    const resp = await fetch('data/index.json?t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    loading.style.display = 'none';

    const briefs = data.briefs || [];
    if (!briefs.length) {
      errBox.textContent = '暂无简报数据，请先运行 main.py 生成。';
      errBox.style.display = 'block';
      return;
    }

    list.innerHTML = briefs.map(b => {
      const tags = (b.sources || []).map(s =>
        `<span class="tag is-light is-small">${s}</span>`).join('');
      return `
      <div class="column is-half">
        <a href="brief.html?v=4&date=${b.date}" class="box brief-card is-block">
          <div class="level is-mobile mb-2">
            <div class="level-left">
              <span class="title is-5 mb-0">${b.display}</span>
              <span class="tag is-info is-light is-small ml-2">8+4</span>
            </div>
            <div class="level-right">
              <span class="tag is-dark is-rounded">${b.count} 条</span>
            </div>
          </div>
          <div class="src-tags mt-3">${tags}</div>
        </a>
      </div>`;
    }).join('');
  } catch (e) {
    loading.style.display = 'none';
    errBox.innerHTML = '加载失败：' + e.message +
      '<br><span class="is-size-7">如为本地打开，请通过 HTTP 服务器访问（file:// 无法读取 JSON）。</span>';
    errBox.style.display = 'block';
  }
}
load();
</script>
</body>
</html>
